<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page Not Found — Mobile Service OS</title>
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="/styles.css" />
<link rel="icon" type="image/png" href="/logo.png" />
<style>
  .nf-wrap { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 1.25rem; }
  .nf-code { font-family: var(--font-display); font-size: 6rem; font-weight: 500; font-style: italic; color: var(--gold); line-height: 1; }
  .nf-wrap p { margin: 1rem 0 2rem; color: var(--text-muted); max-width: 480px; }
</style>
</head>
<body>
<div class="nf-wrap">
  <div class="nf-code">404</div>
  <h1>Page not found.</h1>
  <p>The link you followed may be broken, or the page may have been moved.</p>
  <a class="btn btn-gold btn-lg" href="/">Back to home</a>
</div>
</body>
</html>
